name: Daily Crawler Bot

on:
  schedule:
    # 매일 한국 시간 오전 9시 (UTC 00:00 = KST 09:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 수동 실행용 (Actions 탭에서 Run workflow 버튼)

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 코드
        uses: actions/checkout@v4

      - name: Python 3.10 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 패키지 설치
        run: pip install -r crawler/requirements.txt

      - name: 크롤러 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python crawler/main.py
